{% load static %}
<div class="contact_section layout_padding">
  <div class="container">
    <h1 class="contact_taital" id="map">Rezervace</h1>
    <div class="contact_section_2 layout_padding">
      <div class="row">
        <div class="col-md-6">
          <div class="contact_main">
            <form action="{% url 'contact' %}" method="post">
              {% csrf_token %} {{ form.non_field.errors }}
              {% if success %}
                <div class="text-success contact_text">
                  Odesláno!
                  <br />
                  Naš manažer se s Vámi brzy spojí.
                </div>
              {% else %}
                {% for field in form %}
                  {{ field }}
                  <div class="text-danger">{{ field.errors }}</div>
                {% endfor %}
                <div class="send_bt">
                  <button type="submit">Rezervovat</button>
                </div>
              {% endif %}
            </form>
          </div>
        </div>
        <div class="col-md-6">
          <div class="map_main">
            <div class="map-responsive">
              <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2559.8693566828115!2d14.458848812253581!3d50.088732813223366!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x470b935f9ce8df61%3A0x9ee5902290304e4!2zxIxlcm7DrW5vdmEgMTE2LzMsIDEzMCAwMCBQcmFoYSAzLcW9acW-a292!5e0!3m2!1sen!2scz!4v1698759214263!5m2!1sen!2scz"
                      width="600"
                      height="400"
                      frameborder="0"
                      style="border: 0;
                             width: 100%"
                      allowfullscreen></iframe>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
